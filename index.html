<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>동물의 숲 노션 시계 위젯</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --w-bg: #FDFBF7;
            --w-dot: #E8E2D2;
            --w-border: #F2EFE6;
            --w-text-main: #695D4A;
            --w-text-sub: #8EA37C;
            --w-text-sec: #B0A79A;
            --w-name-bg: #736555;
            --w-name-text: #FDFBF7;
            --w-leaf-bg: #E1EAD8;
            --w-outline-color: #FFFFFF;
        }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            margin: 0;
            padding: 0;
            background-color: transparent; 
        }

        /* 커스텀 스크롤바 (도감 모달용) */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f8f9fa; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        .widget-mode-body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .widget-font {
            font-family: 'Nunito', sans-serif;
        }

        .ac-bg-pattern {
            background-color: var(--w-bg);
            background-image: radial-gradient(var(--w-dot) 2px, transparent 2px);
            background-size: 20px 20px;
            border-color: var(--w-border);
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-6px); }
            100% { transform: translateY(0px); }
        }
        .animate-float {
            animation: float 3s ease-in-out infinite;
        }

        #character-img { transition: opacity 0.3s ease-in-out; }
        
        .text-outline {
            text-shadow: 1.5px 1.5px 0px var(--w-outline-color), -1.5px -1.5px 0px var(--w-outline-color), 1.5px -1.5px 0px var(--w-outline-color), -1.5px 1.5px 0px var(--w-outline-color);
        }

        .theme-text-main { color: var(--w-text-main); }
        .theme-text-sub { color: var(--w-text-sub); }
        .theme-text-sec { color: var(--w-text-sec); }
        .theme-name-bg { background-color: var(--w-name-bg); color: var(--w-name-text); }
        .theme-leaf-bg { background-color: var(--w-leaf-bg); }
        .theme-screw { background-color: var(--w-border); }
        
        @keyframes fadeOut {
            0% { opacity: 1; transform: translateY(0); }
            80% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-10px); }
        }
        .toast-anim {
            animation: fadeOut 2s forwards;
        }
    </style>
</head>
<body id="main-body" class="bg-gray-50 text-gray-800">

                    </div>

                    <div>

                </div>

                        <button id="copy-btn" class="bg-green-500 hover:bg-green-600 text-white font-bold px-5 py-3 rounded-r-xl transition-colors shadow-md shadow-green-200">

                        2. <b>[임베드]</b>을 클릭하고 사이즈를 조절하세요.
                    </div>

            { id: "nana", name: "키키", url: "./ac_images/Nana.webp" },
            { id: "zucker", name: "탁호", url: "./ac_images/Zucker.webp" },
            { id: "genji", name: "토시", url: "./ac_images/Genji.webp" },
            { id: "cally", name: "파슬리", url: "./ac_images/Cally.webp" },
            { id: "stitches", name: "패치", url: "./ac_images/Stitches.webp" },
            { id: "chester", name: "팬타", url: "./ac_images/Chester.webp" },
            { id: "ace", name: "페더", url: "./ac_images/Ace.webp" },
            { id: "chabwick", name: "펭구", url: "./ac_images/Chabwick.webp" },
            { id: "roald", name: "펭수", url: "./ac_images/Roald.webp" },
            { id: "francine", name: "프랑소와", url: "./ac_images/Francine.webp" },
            { id: "flora", name: "플라라", url: "./ac_images/Flora.webp" },
            { id: "beau", name: "피터", url: "./ac_images/Beau.webp" },
            { id: "twiggy", name: "핀틱", url: "./ac_images/Twiggy.webp" },
            { id: "midge", name: "핑글이", url: "./ac_images/Midge.webp" },
            { id: "puck", name: "하키", url: "./ac_images/Puck.webp" },
            { id: "cherry", name: "한나", url: "./ac_images/Cherry.webp" },
            { id: "pascal", name: "해탈한", url: "./ac_images/Pascal.webp" },
            { id: "hamlet", name: "햄스틴", url: "./ac_images/Hamlet.webp" },
            { id: "wade", name: "호떡", url: "./ac_images/Wade.webp" },
            { id: "dizzy", name: "휴지", url: "./ac_images/Dizzy.webp" },
            { id: "bob", name: "히죽", url: "./ac_images/Bob.webp" },
            { id: "billy", name: "힘드러", url: "./ac_images/Billy.webp" }
        ];

        // 🌟 가나다순으로 자동 정렬
        characters.sort((a, b) => a.name.localeCompare(b.name, 'ko-KR'));

        // --- 2. 초기 상태 및 DOM ---
        const urlParams = new URLSearchParams(window.location.search);
        const isWidgetMode = urlParams.get('widget') === 'true';
        
        let activeThemeId = urlParams.get('theme') || 'nook';
        let activeCharId = urlParams.get('char') || 'tom_nook';
        let activeShowSec = urlParams.get('showSec') !== 'false';
        
        const root = document.documentElement;
        const widgetCard = document.getElementById('widget-card');
        const imgEl = document.getElementById('character-img');
        const fallbackIcon = document.getElementById('fallback-icon');
        const nameEl = document.getElementById('character-name');

        let clockInterval;

        // --- 3. 핵심 함수 ---
        
        function applyTheme(themeId) {
            const theme = themes[themeId];
            if (!theme) return;
            for (const [prop, value] of Object.entries(theme.vars)) {
                root.style.setProperty(prop, value);
            }
        }

        function renderCharacter(charData) {
            imgEl.style.opacity = '0';
            setTimeout(() => {
                nameEl.textContent = charData.name;
                imgEl.src = charData.url;
            }, 200);
        }

        function applyCharacterSelection() {
            const targetChar = characters.find(c => c.id === activeCharId) || characters.find(c=>c.id === 'tom_nook');
            renderCharacter(targetChar);
            document.getElementById('char-click-area').style.cursor = 'default';

            // 생성기 모드일 때 버튼 텍스트 업데이트
            if(!isWidgetMode) {
                document.getElementById('selected-char-name').textContent = targetChar.name;
            }
        }

        function applyShowSec() {
            const secEl = document.getElementById('sec-display');
            if (activeShowSec) {
                secEl.style.display = '';
            } else {
                secEl.style.display = 'none';
            }
        }

        function updateClock() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            
            const dateOptions = { month: 'short', day: 'numeric', weekday: 'short' };
            const dateString = now.toLocaleDateString('ko-KR', dateOptions);

            document.getElementById('time-display').textContent = `${hours}:${minutes}`;
            document.getElementById('sec-display').textContent = seconds;
            document.getElementById('date-display').textContent = dateString;
        }

        // --- 4. 초기화 라우팅 (모드 분기) ---
        
        if (isWidgetMode) {
            // [위젯 모드]
            document.getElementById('generator-ui').style.display = 'none';
            const body = document.getElementById('main-body');
            body.className = 'widget-mode-body';
            
            applyTheme(activeThemeId);
            applyCharacterSelection();
            applyShowSec();
            
            imgEl.addEventListener('error', () => {
                imgEl.classList.add('hidden');
                fallbackIcon.classList.remove('hidden');
            });
            imgEl.addEventListener('load', () => {
                imgEl.classList.remove('hidden');
                fallbackIcon.classList.add('hidden');
                imgEl.style.opacity = '1';
            });

            updateClock();
            setInterval(updateClock, 1000);

        } else {
            // [생성기 모드]
            document.getElementById('preview-container').appendChild(widgetCard);
            
            // 테마 드롭다운 채우기
            const themeSelect = document.getElementById('theme-select');
            Object.keys(themes).forEach(id => {
                themeSelect.innerHTML += `<option value="${id}">${themes[id].name}</option>`;
            });

            // 링크 생성 함수
            function generateUrl() {
                const baseUrl = window.location.href.split('?')[0];
                const url = `${baseUrl}?widget=true&theme=${activeThemeId}&char=${activeCharId}&showSec=${activeShowSec}`;
                document.getElementById('embed-url').value = url;
            }

            // --- 🌟 도감 모달 로직 🌟 ---
            const charModalBtn = document.getElementById('char-modal-btn');
            const charModal = document.getElementById('char-modal');
            const charModalContent = document.getElementById('char-modal-content');
            const closeModalBtn = document.getElementById('close-modal-btn');
            const charSearch = document.getElementById('char-search');
            const charGrid = document.getElementById('char-grid');

            function openModal() {
                charModal.classList.remove('hidden');
                // 약간의 딜레이를 주어 transition 적용
                setTimeout(() => {
                    charModal.classList.remove('opacity-0');
                    charModalContent.classList.remove('scale-95');
                }, 10);
                charSearch.value = ''; // 열 때마다 검색창 초기화
                renderGrid(); 
            }

            function closeModal() {
                charModal.classList.add('opacity-0');
                charModalContent.classList.add('scale-95');
                setTimeout(() => {
                    charModal.classList.add('hidden');
                }, 300);
            }

            // 얼굴 도감 렌더링 함수
            function renderGrid(searchTerm = '') {
                charGrid.innerHTML = '';
                const term = searchTerm.trim().toLowerCase();
                // 검색어에 맞게 필터링
                const filtered = characters.filter(c => c.name.toLowerCase().includes(term));
                
                if(filtered.length === 0) {
                    charGrid.innerHTML = `<div class="col-span-full py-10 text-center text-gray-400 font-bold">검색 결과가 없습니다 😢</div>`;
                    return;
                }

                filtered.forEach(c => {
                    const isSelected = (c.id === activeCharId);
                    const btn = document.createElement('button');
                    btn.className = `flex flex-col items-center p-3 rounded-2xl outline-none transition-all transform hover:scale-105 ${isSelected ? 'bg-green-100 border-2 border-green-500 shadow-sm' : 'bg-white border border-gray-100 shadow-sm hover:border-green-300'}`;
                    btn.innerHTML = `
                        <div class="w-14 h-14 sm:w-16 sm:h-16 mb-2">
                            <img src="${c.url}" alt="${c.name}" class="w-full h-full object-contain drop-shadow-sm" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\\'http://www.w3.org/2000/svg\\' fill=\\'%23d1d5db\\' viewBox=\\'0 0 24 24\\'><path d=\\'M17.5,1.5c-2.4,0-4.7,1-6.3,2.8C9.6,2.5,7.3,1.5,4.9,1.5C2.2,1.5,0,3.7,0,6.4c0,5.6,8.4,14.6,10.6,16.8c0.3,0.3,0.8,0.3,1.1,0C14,21.1,22.4,12.1,22.4,6.4C22.4,3.7,20.2,1.5,17.5,1.5z\\'/></svg>'">
                        </div>
                        <span class="text-xs font-bold ${isSelected ? 'text-green-700' : 'text-gray-600'}">${c.name}</span>
                    `;
                    // 캐릭터 선택 시 작동
                    btn.addEventListener('click', () => {
                        activeCharId = c.id;
                        applyCharacterSelection();
                        generateUrl();
                        closeModal();
                    });
                    charGrid.appendChild(btn);
                });
            }

            // 모달 이벤트 리스너
            charModalBtn.addEventListener('click', openModal);
            closeModalBtn.addEventListener('click', closeModal);
            charModal.addEventListener('click', (e) => {
                // 바깥 검은 배경 클릭 시 닫기
                if (e.target === charModal) closeModal();
            });
            charSearch.addEventListener('input', (e) => {
                renderGrid(e.target.value);
            });

            // 기타 이벤트 리스너 연결
            const secSelect = document.getElementById('sec-select');
            secSelect.value = activeShowSec ? "true" : "false";

            themeSelect.addEventListener('change', (e) => {
                activeThemeId = e.target.value;
                applyTheme(activeThemeId);
                generateUrl();
            });

            secSelect.addEventListener('change', (e) => {
                activeShowSec = e.target.value === 'true';
                applyShowSec();
                generateUrl();
            });

            // 복사 버튼
            document.getElementById('copy-btn').addEventListener('click', () => {
                const urlInput = document.getElementById('embed-url');
                const textArea = document.createElement("textarea");
                textArea.value = urlInput.value;
                document.body.appendChild(textArea);
                textArea.select();
                try {
                    document.execCommand('copy');
                    showToast();
                } catch (err) {
                    console.error('복사 실패', err);
                }
                document.body.removeChild(textArea);
            });

            function showToast() {
                const toast = document.getElementById('toast');
                toast.classList.remove('hidden');
                toast.classList.remove('toast-anim');
                void toast.offsetWidth; 
                toast.classList.add('toast-anim');
                setTimeout(() => { toast.classList.add('hidden'); }, 2000);
            }

            // 초기 세팅
            applyTheme(activeThemeId);
            applyCharacterSelection();
            applyShowSec();
            generateUrl();
            
            imgEl.addEventListener('error', () => {
                imgEl.classList.add('hidden');
                fallbackIcon.classList.remove('hidden');
            });
            imgEl.addEventListener('load', () => {
                imgEl.classList.remove('hidden');
                fallbackIcon.classList.add('hidden');
                imgEl.style.opacity = '1';
            });

            updateClock();
            setInterval(updateClock, 1000);
        }

    </script>
</body>
